
<h2 class="sr-only">Medic salary lookup — enter your employee ID to see your old and new salary in simple terms</h2>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --org: #F15A24;
  --org-dark: #D94715;
  --org-light: #FFF3EE;
  --org-soft: #FFE3D8;
  --text: #1E293B;
  --muted: #64748B;
  --border: #E2E8F0;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --success: #16A34A;
  --danger: #DC2626;
}

body {
  background: linear-gradient(135deg,#FFF7F4 0%, #F8FAFC 60%);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  padding: 24px;
}

.wrap {
  max-width: 1180px;
  margin: auto;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(241,90,36,0.12);
  border: 1px solid rgba(255,255,255,0.5);
}

.hdr {
  background: linear-gradient(135deg,var(--org) 0%, var(--org-dark) 100%);
  padding: 32px;
  display: flex;
  align-items: center;
  gap: 18px;
  color: white;
}

.pill {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: white;
}

.pill span {
  color: white;
  font-size: 14px;
  font-weight: 600;
}

.hdr-text h1 {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 6px;
}

.hdr-text p {
  font-size: 15px;
  opacity: 0.9;
}

.search {
  padding: 28px 32px;
  background: white;
  border-bottom: 1px solid var(--border);
}

.search label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  display: block;
  margin-bottom: 10px;
}

.search-row {
  display: flex;
  gap: 14px;
}

.search-row input {
  flex: 1;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid var(--border);
  font-size: 15px;
  transition: 0.2s ease;
}

.search-row input:focus {
  outline: none;
  border-color: var(--org);
  box-shadow: 0 0 0 4px rgba(241,90,36,0.12);
}

button {
  background: linear-gradient(135deg,var(--org),var(--org-dark));
  color: white;
  border: none;
  border-radius: 16px;
  padding: 16px 24px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s ease;
  box-shadow: 0 8px 18px rgba(241,90,36,0.2);
}

button:hover {
  transform: translateY(-1px);
}

.err {
  margin-top: 12px;
  color: var(--danger);
  font-size: 14px;
}

.meta {
  margin-top: 18px;
  display: none;
  flex-wrap: wrap;
  gap: 14px;
}

.meta div {
  background: var(--bg);
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
}

.meta span {
  color: var(--muted);
  font-size: 13px;
}

.meta strong {
  font-size: 14px;
}

.badge {
  display: inline-block;
  background: #DCFCE7;
  color: #166534;
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.badge.exit {
  background: #FEE2E2;
  color: #991B1B;
}

.body {
  padding: 32px;
}

.empty {
  text-align: center;
  padding: 70px 20px;
  color: var(--muted);
  font-size: 16px;
}

.delta {
  background: linear-gradient(135deg,var(--org-light), #fff);
  border: 1px solid #FFD1C0;
  padding: 24px;
  border-radius: 24px;
  margin-bottom: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 20px rgba(241,90,36,0.08);
}

.delta-v {
  font-size: 34px;
  font-weight: 700;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(340px,1fr));
  gap: 22px;
  margin-bottom: 28px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 28px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 30px rgba(15,23,42,0.05);
}

.card.new {
  border: 2px solid rgba(241,90,36,0.25);
  background: linear-gradient(180deg,#fff 0%, #fff7f4 100%);
}

.card-hdr {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cdot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #CBD5E1;
}

.cdot.o {
  background: var(--org);
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  margin: 16px 0 8px;
  text-transform: uppercase;
}

.row, .subtotal, .total-row, .emp-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row {
  padding: 12px 0;
  border-bottom: 1px dashed #E5E7EB;
}

.lbl {
  color: var(--muted);
  font-size: 14px;
}

.val {
  font-weight: 700;
  font-size: 15px;
}

.minus {
  color: var(--danger);
}

.subtotal {
  padding-top: 16px;
  font-weight: 700;
}

.total-row {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 2px solid #E5E7EB;
}

.total-row .lbl {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.total-row .val {
  font-size: 28px;
}

.total-row .org {
  color: var(--org);
}

.sec-lbl {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 14px;
}

.employer-box {
  background: linear-gradient(135deg,#fff,#fff7f4);
  border: 1px solid #FFD9CC;
  padding: 24px;
  border-radius: 24px;
}

.emp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 12px 24px;
  margin-top: 14px;
}

.emp-row {
  background: rgba(255,255,255,0.7);
  padding: 14px 16px;
  border-radius: 14px;
}

@media(max-width:768px){
  body { padding: 10px; }
  .hdr { flex-direction: column; align-items: flex-start; }
  .search-row { flex-direction: column; }
  .delta { flex-direction: column; gap: 18px; align-items: flex-start; }
  .body, .search, .hdr { padding: 22px; }
}
</style>


<div class="wrap">
  <div class="hdr">

    <div class="hdr-text">

  <div class="body" id="body">

      <i class="ti ti-id-badge" aria-hidden="true"></i>
      Enter your employee ID above
    </div>
  </div>
</div>

const MAP = {};
D.forEach(d => MAP[d.id] = d);
const f = n => '₹' + Math.round(n).toLocaleString('en-IN');

function go() {
  const v = document.getElementById('empIn').value.trim();
  const id = parseInt(v);
  const err = document.getElementById('err');
  const meta = document.getElementById('meta');
  const body = document.getElementById('body');
  err.style.display = 'none';
  if (!v || isNaN(id)) { err.textContent = 'Please enter a valid numeric employee ID.'; err.style.display = 'block'; return; }
  const e = MAP[id];
  if (!e) { err.textContent = 'Employee ID ' + id + ' not found. Please check and try again.'; err.style.display = 'block'; meta.style.display = 'none'; body.innerHTML = '<div class="empty"><i class="ti ti-search" aria-hidden="true"></i>No record found for this ID</div>'; return; }
  meta.style.display = 'flex';
  meta.innerHTML = `<div><span>Name&nbsp;</span><strong>${e.name}</strong></div><div><span>City&nbsp;</span><strong>${{DEL:'Delhi',NOI:'Noida',BLR:'Bangalore',MUM:'Mumbai',HYD:'Hyderabad'}[e.city]||e.city}</strong></div><div><span>Hub&nbsp;</span><strong>${e.hub}</strong></div><div><span class="badge${e.s==='Exit'?' exit':''}">${e.s}</span></div>`;
  if (e.s === 'Exit') { body.innerHTML = '<div class="empty"><i class="ti ti-user-off" aria-hidden="true"></i>This employee has exited. Salary data not available.</div>'; return; }

  const delta = e.nH - e.oH;
  const dSign = delta >= 0 ? '+' : '';
  const dClr = delta >= 0 ? '#3B6D11' : '#A32D2D';
  const grossNew = e.w + e.h + e.sa + e.sb + e.ni;
  const deductions = e.pfEe + e.esEe + e.pt;
  const companyCost = e.pfEr + e.esEr;

  body.innerHTML = `
    <div class="delta">
      <div>
        <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#993C1D;margin-bottom:3px;">Change in your take-home salary</div>
        <div style="font-size:12px;color:#993C1D;">Your salary in hand goes from ${f(e.oH)} → <strong>${f(e.nH)}</strong></div>
      </div>
      <div class="delta-v" style="color:${dClr}">${dSign}${f(delta)}</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-hdr"><div class="cdot"></div>Previous salary</div>
        <div class="section-title">What you earned</div>
        <div class="row"><span class="lbl">Fixed salary</span><span class="val">${f(e.oF)}</span></div>
        <div class="row"><span class="lbl">Task incentive</span><span class="val">${f(e.oI)}</span></div>
        <div class="subtotal"><span class="lbl">Total earned</span><span class="val">${f(e.oF+e.oI)}</span></div>
        <div style="height:10px"></div>
        <div class="section-title">Deductions</div>
        <div class="row"><span class="lbl">TDS (10%)</span><span class="val minus">− ${f(e.oT)}</span></div>
        <div class="total-row"><span class="lbl">Take-home</span><span class="val">${f(e.oH)}</span></div>
      </div>

      <div class="card new">
        <div class="card-hdr"><div class="cdot o"></div>New salary</div>
        <div class="section-title">What you earn</div>
        <div class="row"><span class="lbl">Wages</span><span class="val">${f(e.w)}</span></div>
        ${e.h ? `<div class="row"><span class="lbl">HRA</span><span class="val">${f(e.h)}</span></div>` : ''}
        ${e.sa ? `<div class="row"><span class="lbl">Special allowance</span><span class="val">${f(e.sa)}</span></div>` : ''}
        <div class="row"><span class="lbl">Statutory bonus</span><span class="val">${f(e.sb)}</span></div>
        <div class="row"><span class="lbl">Task incentive</span><span class="val">${f(e.ni)}</span></div>
        <div class="subtotal"><span class="lbl">Total earned</span><span class="val">${f(grossNew)}</span></div>
        <div style="height:10px"></div>
        <div class="section-title">Your deductions</div>
        <div class="row"><span class="lbl">PF contribution</span><span class="val minus">− ${f(e.pfEe)}</span></div>
        <div class="row"><span class="lbl">ESIC contribution</span><span class="val minus">− ${f(e.esEe)}</span></div>
        ${e.pt ? `<div class="row"><span class="lbl">Professional tax</span><span class="val minus">− ${f(e.pt)}</span></div>` : ''}
        <div class="subtotal"><span class="lbl">Total deductions</span><span class="val minus">− ${f(deductions)}</span></div>
        <div class="total-row"><span class="lbl">Take-home</span><span class="val org">${f(e.nH)}</span></div>
      </div>
    </div>

    <div class="sec-lbl">Company's additional contribution (paid by OHL, not deducted from you)</div>
    <div class="employer-box">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5;">OHL separately contributes towards your PF and ESIC on top of your salary. These amounts are <strong style="color:var(--color-text-primary)">not deducted</strong> from your earnings.</div>
      <div class="emp-grid">
        <div class="emp-row"><span class="lbl">PF (employer share)</span><span class="val">${f(e.pfEr)}</span></div>
        <div class="emp-row"><span class="lbl">ESIC (employer share)</span><span class="val">${f(e.esEr)}</span></div>
        <div class="emp-row"><span class="lbl">Total company contribution</span><span class="val">${f(companyCost)}</span></div>
        <div class="emp-row"><span class="lbl">Your total CTC (fixed)</span><span class="val">${f(e.nF)}</span></div>
      </div>
    </div>
  `;
}
</script>
